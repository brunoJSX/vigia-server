services:
  vigia:
    build: .
    environment:
      DATABASE_URL: ${DATABASE_URL}
      HTTP_ADDR: :8080
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
    depends_on:
      - vigia
    restart: unless-stopped

volumes:
  caddy_data:
